name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Compilar APK (debug)
        run: gradle assembleDebug

      - name: Renomear APK
        run: cp app/build/outputs/apk/debug/app-debug.apk dex-control.apk

      - name: Publicar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: dex-control-apk
          path: dex-control.apk

      - name: Criar Release com o APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: DeX Control v1.0.${{ github.run_number }}
          body: |
            APK gerado automaticamente.

            **Instalação:**
            1. Baixe o arquivo `dex-control.apk` abaixo no seu celular Samsung.
            2. Toque no arquivo para instalar (permita "instalar de fontes desconhecidas" se pedido).
            3. Abra o app e siga as instruções para ativar o serviço de acessibilidade.
          files: dex-control.apk
